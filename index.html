<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="112 Acil Müdahale Asistanı — Hastane öncesi bakım protokolleri">
<title>112 Acil Müdahale Asistanı | KKM + SAKOM Entegre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #D0021B;
  --red-dark: #A50015;
  --red-light: #FFEEF0;
  --red-mid: #FF3347;
  --navy: #0D1B2A;
  --navy2: #162236;
  --slate: #2C3E50;
  --muted: #6B7C93;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(0,0,0,0.08);
  --card-bg: #1A2738;
  --card-bg2: #1E2D40;
  --text: #F0F4F8;
  --text2: #A8B8CC;
  --text3: #6B7C93;
  --green: #00C48C;
  --amber: #F5A623;
  --blue: #4A90E2;
  --radius: 14px;
  --radius-sm: 8px;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--sans);
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.app-header {
  background: var(--navy2);
  border-bottom: 1px solid var(--border);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px 10px;
}

.logo-badge {
  background: var(--red);
  color: #fff;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  padding: 6px 10px;
  border-radius: 8px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.header-titles { flex: 1; min-width: 0; }
.header-titles h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-titles p {
  font-size: 11px;
  color: var(--text3);
  margin-top: 1px;
}

.header-search {
  padding: 0 16px 12px;
  position: relative;
}
.header-search input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px 9px 36px;
  font-size: 14px;
  color: var(--text);
  font-family: var(--sans);
  outline: none;
  transition: border-color .2s;
}
.header-search input:focus { border-color: rgba(208,2,27,0.5); }
.header-search input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}

/* NAV TABS */
.nav-tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 4px;
  padding: 0 16px 12px;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.nav-tab .tab-icon { font-size: 18px; line-height: 1; }
.nav-tab.active {
  background: var(--red);
  color: #fff;
}
.nav-tab:not(.active):hover { background: rgba(255,255,255,0.06); color: var(--text2); }

/* MAIN */
main { padding: 16px; max-width: 600px; margin: 0 auto; }

.section { display: none; }
.section.active { display: block; }

/* CARDS */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.card-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.card-icon.red { background: rgba(208,2,27,0.2); }
.card-icon.amber { background: rgba(245,166,35,0.2); }
.card-icon.green { background: rgba(0,196,140,0.2); }
.card-icon.blue { background: rgba(74,144,226,0.2); }

.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

.card-body { padding: 14px 16px; }

/* CATEGORY GRID */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.cat-btn {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  text-align: left;
  transition: all .2s;
  color: var(--text);
}
.cat-btn:hover, .cat-btn:active { border-color: var(--red); background: rgba(208,2,27,0.08); }
.cat-btn .cat-icon { font-size: 22px; margin-bottom: 6px; display: block; }
.cat-btn .cat-name { font-size: 13px; font-weight: 600; color: var(--text); }
.cat-btn .cat-count { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* SECTION LABEL */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 4px;
  font-family: var(--mono);
}

/* ALGO LIST */
.algo-list { display: flex; flex-direction: column; gap: 8px; }

.algo-item {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .2s;
}
.algo-item:hover, .algo-item:active { border-color: var(--red); }
.algo-item .algo-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
.algo-item .algo-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  flex-shrink: 0;
  font-family: var(--mono);
}
.algo-item .algo-badge.kritik { background: rgba(208,2,27,0.2); color: #FF6B7A; }
.algo-item .algo-badge.dikkat { background: rgba(245,166,35,0.2); color: #F5A623; }
.algo-item .chevron { color: var(--text3); font-size: 16px; }

/* BACK BTN */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--text2);
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  margin-bottom: 14px;
  transition: all .2s;
}
.back-btn:hover { border-color: rgba(255,255,255,0.2); }

/* DETAIL */
.detail-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}

.detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
  font-family: var(--mono);
}
.detail-badge.kritik { background: rgba(208,2,27,0.2); color: #FF6B7A; border: 1px solid rgba(208,2,27,0.3); }
.detail-badge.dikkat { background: rgba(245,166,35,0.2); color: #F5A623; border: 1px solid rgba(245,166,35,0.3); }

.steps-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-family: var(--mono);
}

.step-list { list-style: none; counter-reset: steps; }
.step-list li {
  counter-increment: steps;
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--text2);
  line-height: 1.55;
}
.step-list li:last-child { border-bottom: none; }
.step-list li::before {
  content: counter(steps);
  min-width: 26px; height: 26px;
  background: var(--red);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--mono);
  flex-shrink: 0;
  margin-top: 1px;
}

/* YENİ: SAKOM ve KKM Özel Kutuları */
.sakom-box {
  background: rgba(208,2,27,0.15);
  border-left: 4px solid var(--red);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #FF9EAA;
  line-height: 1.55;
  margin-top: 14px;
}
.sakom-box::before { content: '📢 SAKOM ARANMALI: '; font-weight: 700; color: #FF6B7A; }

.kkm-box {
  background: rgba(74,144,226,0.1);
  border-left: 4px solid var(--blue);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #7EB8FF;
  line-height: 1.55;
  margin-top: 10px;
}
.kkm-box::before { content: '🎙️ KKM NOTU: '; font-weight: 700; }

.warn-box {
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #F5A623;
  line-height: 1.55;
  margin-top: 14px;
}
.warn-box::before { content: '⚠ '; font-weight: 700; }

.danger-box {
  background: rgba(208,2,27,0.1);
  border: 1px solid rgba(208,2,27,0.25);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #FF6B7A;
  line-height: 1.55;
  margin-top: 10px;
}

.info-box {
  background: rgba(74,144,226,0.1);
  border: 1px solid rgba(74,144,226,0.25);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #7EB8FF;
  line-height: 1.55;
  margin-top: 10px;
}

/* DOSE */
.dose-weight-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.dose-weight-row label { font-size: 13px; color: var(--text3); white-space: nowrap; }
.dose-weight-row input[type=range] { flex: 1; accent-color: var(--red); }
.dose-weight-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--red-mid);
  min-width: 60px;
  text-align: right;
}

.age-select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
}
.age-select option { background: var(--navy2); }

.dose-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.dose-item {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.dose-item .d-name { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.dose-item .d-val {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  font-family: var(--mono);
  line-height: 1;
}
.dose-item .d-unit { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

/* CPR */
.cpr-display {
  text-align: center;
  padding: 24px 16px;
}
.cpr-timer {
  font-family: var(--mono);
  font-size: 64px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 4px;
  line-height: 1;
  margin-bottom: 8px;
  transition: color .3s;
}
.cpr-timer.pulse { color: var(--red-mid); }
.cpr-phase {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 20px;
  font-family: var(--mono);
  letter-spacing: 0.5px;
}
.cpr-phase-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--mono);
  margin-bottom: 20px;
  transition: all .3s;
}
.cpr-phase-badge.compress { background: rgba(208,2,27,0.2); color: #FF6B7A; border: 1px solid rgba(208,2,27,0.3); }
.cpr-phase-badge.ventilate { background: rgba(0,196,140,0.2); color: #00C48C; border: 1px solid rgba(0,196,140,0.3); }

.cpr-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.cpr-btn {
  padding: 12px 22px;
  border-radius: 10px;
  border: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.cpr-btn.start { background: var(--red); color: #fff; }
.cpr-btn.start:hover { background: var(--red-dark); }
.cpr-btn.stop { background: rgba(255,255,255,0.08); color: var(--text2); border: 1px solid var(--border); }
.cpr-btn.reset { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border); }

.cpr-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 4px;
}
.cpr-stat {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.cpr-stat .sv { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text); }
.cpr-stat .sl { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* QUIZ */
.quiz-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 3px;
  background: var(--red);
  border-radius: 2px;
  transition: width .4s ease;
}
.quiz-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 14px;
  font-family: var(--mono);
}
.quiz-q {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 16px;
}
.quiz-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.quiz-opt {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 14px;
  font-size: 14px;
  color: var(--text2);
  text-align: left;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .2s;
  line-height: 1.4;
}
.quiz-opt:not(:disabled):hover { border-color: rgba(255,255,255,0.2); }
.quiz-opt.correct { background: rgba(0,196,140,0.1); border-color: rgba(0,196,140,0.4); color: #00C48C; }
.quiz-opt.wrong { background: rgba(208,2,27,0.1); border-color: rgba(208,2,27,0.3); color: #FF6B7A; }

.quiz-explain {
  background: rgba(74,144,226,0.1);
  border: 1px solid rgba(74,144,226,0.2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  color: #7EB8FF;
  line-height: 1.55;
  margin-bottom: 12px;
  display: none;
}
.quiz-next-btn {
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  display: none;
  transition: background .2s;
}
.quiz-next-btn:hover { background: var(--red-dark); }

.quiz-result {
  text-align: center;
  padding: 20px 0;
}
.quiz-result .qr-score {
  font-family: var(--mono);
  font-size: 52px;
  font-weight: 700;
  color: var(--red-mid);
  line-height: 1;
  margin-bottom: 8px;
}
.quiz-result .qr-label { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.quiz-result .qr-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.quiz-restart {
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
}

/* EVT */
.evt-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.evt-tab {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
}
.evt-tab.active { background: rgba(74,144,226,0.2); color: #7EB8FF; border-color: rgba(74,144,226,0.4); }

.evt-sec { display: none; }
.evt-sec.active { display: block; }

.crit-item {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  line-height: 1.5;
}
.crit-item:last-child { border-bottom: none; }
.crit-item .ci-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.crit-item.yes .ci-text { color: #00C48C; }
.crit-item.no .ci-text { color: #FF6B7A; }

.race-score-display {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-top: 14px;
  text-align: center;
}
.race-score-num {
  font-family: var(--mono);
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.race-score-label { font-size: 13px; color: var(--text3); margin-top: 4px; }

.race-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.race-row:last-child { border-bottom: none; }
.race-label { flex: 1; font-size: 13px; color: var(--text2); }
.race-row input[type=range] { width: 80px; accent-color: var(--blue); }
.race-val { font-family: var(--mono); font-size: 14px; color: var(--text); min-width: 20px; text-align: center; }

.tl-item {
  display: flex;
  gap: 12px;
  padding-bottom: 16px;
  position: relative;
}
.tl-item:last-child { padding-bottom: 0; }
.tl-dot-col { display: flex; flex-direction: column; align-items: center; }
.tl-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  flex-shrink: 0;
  z-index: 1;
}
.tl-line { width: 2px; flex: 1; background: var(--border); min-height: 16px; }
.tl-content { padding-top: 4px; }
.tl-time { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 2px; }
.tl-title { font-size: 14px; font-weight: 600; color: var(--text); }
.tl-desc { font-size: 12px; color: var(--text3); margin-top: 2px; line-height: 1.4; }

/* METRICS ROW */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.metric-box {
  background: var(--card-bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.metric-box .mv {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--red-mid);
  line-height: 1;
}
.metric-box .ml { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.3; }

/* SEARCH RESULTS */
.search-results { display: none; }
.no-results { text-align: center; padding: 32px; color: var(--text3); font-size: 14px; }

/* FOOTER */
.app-footer {
  text-align: center;
  padding: 20px 16px 32px;
  font-size: 11px;
