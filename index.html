<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASOS ULTRA V4</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff4757; --bg: #0a0e14; --card: #151a24; --border: #2f3542; --blue: #00d2ff; --green: #2ed573; --text: #ced4da; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ÜST PANEL */
        header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .offline-dot { background: var(--red); box-shadow: 0 0 10px var(--red); }

        /* HARİTA KISITLI ALAN */
        #map { height: 35vh; width: 100%; border-bottom: 1px solid var(--border); }

        /* ANA İŞLEM ALANI (SCROLL OLABİLİR) */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        
        .section-title { font-family: 'Rajdhani'; color: var(--blue); font-size: 14px; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; }

        /* ULTRA FORM TASARIMI */
        .vaka-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .u-input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-size: 14px; }
        
        /* HAYATİ BULGULAR (GRID) */
        .vital-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .vital-box { background: #000; border: 1px solid var(--border); padding: 8px; border-radius: 8px; text-align: center; }
        .vital-box input { width: 100%; background: transparent; border: none; color: var(--green); text-align: center; font-size: 18px; font-family: 'Rajdhani'; font-weight: 700; }

        /* ALT NAVİGASYON (FIXED) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid var(--border); padding: 10px; gap: 10px; }
        .nav-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        .btn-red { background: var(--red); }
        .nav-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <div style="font-family: 'Rajdhani'; font-weight: 700;">ASOS <span style="color:var(--red)">ULTRA</span></div>
        <div id="net-status"><span class="status-dot online-dot"></span><small>SİSTEM AKTİF</small></div>
    </header>

    <div id="map"></div>

    <main>
        <div class="section-title">🩺 HASTA VE VAKA BİLGİLERİ</div>
        <div class="vaka-card">
            <div class="input-group">
                <label>AD SOYAD / PROTOKOL</label>
                <input type="text" class="u-input" id="p_name" placeholder="Vaka Bilgisi Giriniz...">
            </div>
            
            <div class="section-title" style="font-size: 11px; margin-top: 15px;">📊 VİTAL BULGULAR</div>
            <div class="vital-grid">
                <div class="vital-box"><label>TA</label><input type="text" placeholder="12/8"></div>
                <div class="vital-box"><label>NABIZ</label><input type="number" placeholder="80"></div>
                <div class="vital-box"><label>SPO2</label><input type="number" placeholder="98"></div>
            </div>
        </div>

        <div class="section-title">📝 TIBBİ MÜDAHALE NOTLARI</div>
        <textarea class="u-input" style="height: 80px; resize: none;" placeholder="Uygulanan tedavi ve ilaçlar..."></textarea>
    </main>

    <div class="bottom-nav">
        <button class="nav-btn btn-blue" onclick="saveOffline()">💾 TASLAK KAYDET</button>
        <button class="nav-btn btn-green" onclick="sendToCenter()">🚀 MERKEZE GÖNDER</button>
    </div>

    <script>
        // --- HARİTA AYARLARI ---
        var map = L.map('map', { zoomControl: false }).setView([41.7351, 27.2243], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        var marker = L.marker([41.7351, 27.2243]).addTo(map);

        // --- OFFLINE KAYIT MEKANİZMASI ---
        function saveOffline() {
            const data = {
                isim: document.getElementById('p_name').value,
                zaman: new Date().toISOString(),
                durum: 'Taslak'
            };
            localStorage.setItem('last_vaka', JSON.stringify(data));
            alert("Vaka telefon hafızasına kaydedildi (İnternetsiz mod).");
        }

        // --- MERKEZE GÖNDER (SİMÜLASYON) ---
        function sendToCenter() {
            if (!navigator.onLine) {
                alert("İnternet yok! Veri, bağlantı gelince otomatik gönderilecek.");
                return;
            }
            alert("Veriler Kırklareli KKM merkezine başarıyla aktarıldı.");
        }

        // --- NETWORK TAKİBİ ---
        window.addEventListener('offline', () => {
            document.getElementById('net-status').innerHTML = '<span class="status-dot offline-dot"></span><small>ÇEVRİMDIŞI MOD</small>';
        });
        window.addEventListener('online', () => {
            document.getElementById('net-status').innerHTML = '<span class="status-dot online-dot"></span><small>SİSTEM AKTİF</small>';
        });

        // --- SESLİ KOMUT BAŞLATMA ---
        window.onload = () => {
            const msg = new SpeechSynthesisUtterance("ASOS Ultra Mobil Sistemi Hazır. İyi nöbetler.");
            msg.lang = "tr-TR";
            window.speechSynthesis.speak(msg);
        };
    </script>
</body>
</html>
